<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dEducation | Recovery Mode</title>
    <style>
        /* БАЗОВЫЕ СТИЛИ ЧТОБЫ ВСЁ НЕ РАЗВАЛИЛОСЬ */
        body { background: #0f0f1a; color: white; font-family: sans-serif; margin: 0; }
        .auth-container { display: flex; justify-content: center; align-items: center; height: 100vh; }
        .auth-card { background: #1a1a2e; padding: 2rem; border-radius: 20px; text-align: center; width: 320px; }
        .btn-primary { background: #7b61ff; color: white; border: none; padding: 12px 20px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; }
        input { width: 100%; padding: 10px; margin: 1rem 0; border-radius: 8px; border: none; background: #252545; color: white; box-sizing: border-box; }
        #app-screen { display: none; padding: 2rem; }
        .lesson-card { background: #1a1a2e; padding: 1rem; border-radius: 15px; margin-bottom: 1rem; border-left: 5px solid #7b61ff; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <!-- ЭКРАН ВХОДА -->
    <div id="auth-screen" class="auth-container">
        <div class="auth-card">
            <h1 style="color: #7b61ff;">dEducation</h1>
            <p>Вход в систему</p>
            <input type="email" id="user-email" value="multoretik@gmail.com">
            <button class="btn-primary" id="login-btn">ВОЙТИ</button>
            <div id="status" style="margin-top: 10px; font-size: 0.8rem; opacity: 0.5;"></div>
        </div>
    </div>

    <!-- ОСНОВНОЙ ЭКРАН -->
    <div id="app-screen">
        <h1 id="welcome-msg">Загрузка...</h1>
        <div id="content-area"></div>
        <button onclick="localStorage.clear(); location.reload();" style="background:none; border:1px solid red; color:red; padding:5px 10px; cursor:pointer; border-radius:5px;">Выйти</button>
    </div>

    <script>
        // ГЛОБАЛЬНЫЙ ПЕРЕХВАТ ОШИБОК
        window.onerror = (m, u, l) => alert("ОШИБКА: " + m + " на строке " + l);

        const URL = 'https://jjjkypymutcvrlngyhtt.supabase.co';
        const KEY = 'sb_publishable_L1a5vhq7PjjSh7QTIrPGRg_RO-bH6FN';
        let sb;

        document.getElementById('login-btn').onclick = async () => {
            const email = document.getElementById('user-email').value;
            const status = document.getElementById('status');
            status.innerText = "Подключение...";
            
            try {
                if (!window.supabase) throw new Error("Supabase не загружен");
                sb = window.supabase.createClient(URL, KEY);
                
                localStorage.setItem('d_edu_user', email);
                
                status.innerText = "Поиск данных...";
                const { data: old } = await sb.from('user_progress').select('data').eq('user_id', email).maybeSingle();
                
                if (old && old.data) {
                    status.innerText = "Миграция данных...";
                    await migrate(email, old.data);
                }
                
                location.reload();
            } catch (e) {
                alert("Ошибка: " + e.message);
                status.innerText = "";
            }
        };

        async function migrate(uid, d) {
            if (d.stats) await sb.from('user_profiles').upsert({ user_id: uid, xp: d.stats.totalXp||0, coins: d.stats.coins||0 });
            if (d.lessons) {
                const ent = Object.entries(d.lessons).map(([id, v]) => ({ user_id: uid, lesson_id: id, status: v.status||'completed', progress: v.progress||100 }));
                if (ent.length > 0) await sb.from('user_lessons').upsert(ent, { onConflict: 'user_id, lesson_id' });
            }
        }

        window.onload = async () => {
            const user = localStorage.getItem('d_edu_user');
            if (user && window.supabase) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app-screen').style.display = 'block';
                document.getElementById('welcome-msg').innerText = "Привет, " + user;
                
                sb = window.supabase.createClient(URL, KEY);
                const { data: lessons } = await sb.from('user_lessons').select('*').eq('user_id', user);
                
                const area = document.getElementById('content-area');
                if (lessons && lessons.length > 0) {
                    area.innerHTML = "<h2>Ваши уроки:</h2>";
                    lessons.forEach(l => {
                        const card = document.createElement('div');
                        card.className = "lesson-card";
                        card.innerHTML = `<strong>${l.lesson_id}</strong><br>Прогресс: ${l.progress}%`;
                        area.appendChild(card);
                    });
                } else {
                    area.innerHTML = "<p>Уроков пока нет. Перейдите в каталог.</p>";
                }
            }
        };
    </script>
</body>
</html>
