<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dEducation | Система Обучения</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <style>
        /* Гарантируем, что фон всегда темный, а не белый */
        body { background: #0f0f1a; margin: 0; color: white; font-family: 'Outfit', sans-serif; }
        #loading-overlay { position: fixed; inset: 0; display: flex; justify-content: center; align-items: center; background: #0f0f1a; z-index: 9999; transition: opacity 0.5s; }
    </style>
</head>
<body>

    <!-- Заставка загрузки (исчезнет когда JS сработает) -->
    <div id="loading-overlay">
        <div style="text-align: center;">
            <div class="logo" style="font-size: 2.5rem; font-weight: bold; margin-bottom: 1rem;">d<span>Education</span></div>
            <div style="opacity: 0.5;">Загрузка системы...</div>
        </div>
    </div>

    <!-- Экран Входа (виден по умолчанию, если JS не скроет его) -->
    <div id="auth-screen" class="auth-container" style="display: none;">
        <div class="auth-card">
            <div class="logo">d<span>Education</span></div>
            <h2>С возвращением</h2>
            <p>Введите Email для входа</p>
            <div class="form-group">
                <input type="email" id="username-input" value="multoretik@gmail.com">
            </div>
            <button class="btn-primary" id="login-btn">Войти в систему</button>
        </div>
    </div>

    <!-- Основной интерфейс -->
    <div id="app-screen" class="app-container" style="display: none;">
        <aside>
            <div class="logo">d<span>Education</span></div>
            <ul class="nav-menu">
                <li class="nav-item"><a href="#" class="nav-link active" onclick="switchView('home')"><ion-icon name="home-outline"></ion-icon> Главная</a></li>
                <li class="nav-item"><a href="#" class="nav-link" onclick="switchView('schedule')"><ion-icon name="calendar-outline"></ion-icon> План</a></li>
                <li class="nav-item"><a href="#" class="nav-link" onclick="switchView('catalog')"><ion-icon name="book-outline"></ion-icon> Каталог</a></li>
                <li class="nav-item"><a href="#" class="nav-link" onclick="switchView('profile')"><ion-icon name="person-outline"></ion-icon> Профиль</a></li>
            </ul>
        </aside>

        <main id="main-content">
            <div class="header-section">
                <h1 id="view-title">Главная</h1>
                <p id="view-subtitle">Загрузка данных...</p>
            </div>
            <div class="day-selector" id="day-selector"></div>
            <div class="lessons-container" id="lessons-list"></div>
            
            <div class="fab-container" onclick="openAddLessonModal()">
                <div class="fab-btn"><ion-icon name="add"></ion-icon></div>
            </div>
        </main>
    </div>

    <div class="modal-overlay" id="modal-overlay">
        <div class="modal-content" id="modal-content"></div>
    </div>

    <script src="data_v5.js"></script>
    <script src="app.js"></script>
</body>
</html>
