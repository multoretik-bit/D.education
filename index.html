<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dEducation | Premium</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
</head>
<body>

    <div id="auth-screen" class="auth-container" style="display: none;">
        <div class="auth-card">
            <div class="logo">d<span>Education</span></div>
            <h2>Вход</h2>
            <div class="form-group">
                <input type="email" id="username-input" value="multoretik@gmail.com">
            </div>
            <button class="btn-primary" id="login-btn" onclick="handleLogin()">Войти</button>
        </div>
    </div>

    <div id="app-screen" class="app-container" style="display: none;">
        <aside>
            <div class="logo">d<span>Education</span></div>
            <ul class="nav-menu">
                <li class="nav-item"><a href="#" id="nav-home" class="nav-link active" onclick="switchView('home')"><ion-icon name="home-outline"></ion-icon> Главная</a></li>
                <li class="nav-item"><a href="#" id="nav-catalog" class="nav-link" onclick="switchView('catalog')"><ion-icon name="grid-outline"></ion-icon> Мои Блоки</a></li>
                <li class="nav-item"><a href="#" class="nav-link" onclick="logout()"><ion-icon name="log-out-outline"></ion-icon> Выход</a></li>
            </ul>
        </aside>

        <main id="main-content">
            <div class="header-section">
                <h1 id="view-title">Главная</h1>
                <p id="view-subtitle">Загрузка ваших данных...</p>
            </div>
            
            <div class="day-selector" id="day-selector"></div>
            <div class="lessons-container" id="lessons-list"></div>

            <div class="fab-container" onclick="alert('Добавление скоро будет доступно')">
                <div class="fab-btn"><ion-icon name="add"></ion-icon></div>
            </div>
        </main>
    </div>

    <script src="data_v5.js"></script>
    <script src="app.js"></script>
</body>
</html>
